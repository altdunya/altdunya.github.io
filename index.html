<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltDünya</title>
  <meta name="description" content="AltDünya retro oyun vitrini, kategori sayfaları, oyun sayfaları ve pack detayları." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
</head>
<body>
  <div class="site-shell">

      <div class="brand" aria-label="AltDünya ana sayfa"><img src="assets/images/altdunya-logo-site.png" alt="AltDünya" /></div>
      <nav id="mainNav" class="main-nav" aria-label="Ana gezinme"></nav>
      <div class="topbar-actions">
        <button class="icon-btn" id="menuBtn" aria-label="Menüyü aç">☰</button>
      </div>

    <main class="content-area">
      <div id="app"></div>
    </main>
  </div>

  <aside id="slidePanel" class="slide-panel" aria-hidden="true">
    <div class="slide-panel-header">
      <div>
        <div class="kicker">AltDünya</div>
        <strong>Hızlı Menü</strong>
      </div>
      <button class="icon-btn" id="closePanelBtn" aria-label="Menüyü kapat">✕</button>
    </div>
    <div class="slide-panel-content">
      <a href="#/home">Ana Sayfa</a>
      <a href="#/games">Tüm Oyunlar</a>
      <a href="#/category/freeware">Freeware</a>
      <a href="#/category/arcade">Arcade</a>

  <div id="panelBackdrop" class="panel-backdrop"></div>

  <script src="assets/js/app.js"></script>

</html>
