<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltDünya Admin - Oyunlar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <div class="admin-layout clean-admin-layout">
    <aside class="admin-sidebar clean-admin-sidebar">
      <div>
        <div class="brand">AltDünya</div>
        <div class="admin-note">Yönetim paneli</div>
      </div>
      <nav class="admin-menu">
        <a class="admin-menu-link active" href="admin.html">Oyun Ekle / Düzenle</a>
        <a class="admin-menu-link" href="settings.html">Site Ayarları</a>
        <a class="admin-menu-link" href="index.html">Siteye Dön</a>
      </nav>
      <div class="admin-note">Bu sayfa sadece oyunları yönetir. Hero ve popüler ayarları ayrı sayfada tutulur.</div>
    </aside>

    <main class="admin-main clean-admin-main">
      <section class="admin-list-card clean-card">
        <div class="admin-toolbar">
          <h1>Oyunlar</h1>
          <button id="newGameBtn" class="primary-btn" type="button">Yeni Oyun</button>
        </div>
        <div class="admin-row-gap">
          <input id="gameSearch" class="search" type="search" placeholder="Oyun ara..." />
          <div id="gameCount" class="muted"></div>
          <div id="gameList" class="game-list"></div>
        </div>
      </section>

      <section class="admin-form-card clean-card">
        <div class="admin-toolbar">
          <div>
            <h1 id="formTitle">Yeni Oyun</h1>
            <div class="muted">Oyun bilgilerini burada düzenle.</div>
          </div>
          <div class="admin-actions-row">
            <button id="deleteBtn" class="danger-btn" type="button" style="display:none">Sil</button>
          </div>
        </div>

        <form id="gameForm" class="admin-form">
          <div class="form-grid form-grid-3">
            <label><span>Başlık</span><input name="title" required /></label>
            <label><span>Slug</span><input name="slug" required /></label>
            <label><span>Kategori</span>
              <select name="category">
                <option value="freeware">Freeware</option>
                <option value="arcade">Arcade</option>
                <option value="konsol">Konsol</option>
                <option value="openbor">OpenBOR</option>
                <option value="videolar">Videolar</option>
              </select>
            </label>
            <label><span>Segment</span><input name="segment" /></label>
            <label><span>Platform</span><input name="platform" /></label>
            <label><span>Tür</span><input name="genre" /></label>
            <label><span>Yıl</span><input name="year" type="number" /></label>
            <label><span>Geliştirici</span><input name="developer" /></label>
            <label><span>Yayıncı</span><input name="publisher" /></label>
            <label><span>Metacritic</span><input name="metacritic" type="number" /></label>
            <label><span>Oyuncu</span><input name="players" /></label>
            <label><span>Seri</span><input name="series" /></label>
            <label class="full"><span>Hero Alt Başlık</span><input name="heroTitle" /></label>
            <label class="full"><span>Kısa Açıklama</span><textarea name="shortDescription"></textarea></label>
            <label class="full"><span>Kapak Görseli</span><input name="cover" /></label>
            <label class="full"><span>YouTube / Embed URL</span><input name="videoUrl" /></label>
            <label class="full"><span>Etiketler (virgülle)</span><input name="tags" /></label>
            <label class="full"><span>Ekran Görüntüleri (satır satır)</span><textarea name="screenshots"></textarea></label>
            <label class="full"><span>Hikâye / Açıklama</span><textarea name="story"></textarea></label>
          </div>

          <details open class="editor-block">
            <summary>Pack Bilgileri</summary>
            <div class="form-grid form-grid-3">
              <label><span>Sürüm</span><input name="packVersion" /></label>
              <label><span>Boyut</span><input name="packSize" /></label>
              <label><span>Kontroller</span><input name="packControls" /></label>
              <label class="full"><span>Notlar</span><input name="packNotes" /></label>
              <label class="full"><span>Adımlar (satır satır)</span><textarea name="packSteps"></textarea></label>
              <label class="full"><span>İndirme URL</span><input name="archiveUrl" /></label>
            </div>
          </details>

          <div class="admin-bottom-bar">
            <div class="top-actions">
              <button class="primary-btn" type="submit">Kaydet</button>
              <button class="secondary-btn" id="exportBtn" type="button">JSON Dışa Aktar</button>
              <label class="import-label compact">JSON İçe Aktar <input id="importInput" type="file" accept="application/json" /></label>
            </div>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script src="admin.js"></script>
</body>
</html>
