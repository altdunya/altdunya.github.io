<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AltDünya Admin</title>
  <meta name="description" content="AltDünya oyun ekleme ve düzenleme paneli." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <div class="admin-shell">
    <header class="admin-topbar">
      <div>
        <div class="brand">AltDünya Admin</div>
        <p class="admin-topbar-text">Oyunları soldan seç, sağda geniş editörde düzenle. Hero ve popüler alanı ayrı karttan yönet.</p>
      </div>
      <div class="admin-topbar-actions">
        <button class="secondary-btn" id="newGameBtn" type="button">Yeni Oyun</button>
        <button class="primary-btn" id="saveSettingsBtn" type="button">Site Ayarlarını Kaydet</button>
        <button class="secondary-btn" id="exportBtn" type="button">JSON Dışa Aktar</button>
        <label class="import-label compact">JSON İçe Aktar
          <input id="importInput" type="file" accept="application/json" />
        </label>
        <a class="secondary-btn" href="index.html">Siteye Dön</a>
      </div>
    </header>

    <main class="admin-workspace">
      <aside class="admin-left">
        <section class="admin-panel admin-settings-card">
          <div class="section-head compact-head">
            <h2>Site Ayarları</h2>
          </div>
          <div class="settings-stack">
            <label>Hero Oyunu
              <select id="heroSelect"></select>
            </label>
            <div>
              <div class="settings-title-row">
                <strong>Popüler Oyunlar</strong>
                <span class="muted small">Ana sayfa + sol liste</span>
              </div>
              <div id="popularSlots" class="popular-grid"></div>
            </div>
          </div>
        </section>

        <section class="admin-panel admin-list-panel">
          <div class="section-head compact-head">
            <h2>Oyun Kayıtları</h2>
            <span class="muted small" id="gameCount"></span>
          </div>
          <input id="gameSearch" type="search" placeholder="Oyun ara..." />
          <div id="gameList" class="game-list"></div>
        </section>
      </aside>

      <section class="admin-right">
        <div class="admin-panel editor-shell">
          <div class="editor-header">
            <div>
              <div class="kicker">Oyun Editörü</div>
              <h1 id="formTitle">Yeni Oyun</h1>
            </div>
            <div class="editor-actions">
              <button type="button" class="danger-btn" id="deleteBtn" style="display:none">Sil</button>
              <button class="primary-btn" form="gameForm" type="submit">Oyunu Kaydet</button>
            </div>
          </div>

          <form id="gameForm" class="admin-form modern-form">
            <details class="editor-block" open>
              <summary>Temel Bilgiler</summary>
              <div class="form-grid form-grid-3">
                <label>Oyun Adı<input name="title" required /></label>
                <label>Slug<input name="slug" placeholder="tekken-3" required /></label>
                <label>Kategori
                  <select name="category">
                    <option value="freeware">Freeware</option>
                    <option value="arcade">Arcade</option>
                    <option value="konsol">Konsol</option>
                    <option value="videolar">Videolar</option>
                  </select>
                </label>
                <label>Segment<input name="segment" placeholder="Retro Port" /></label>
                <label>Platform<input name="platform" placeholder="PS1 / DOS / PC" /></label>
                <label>Tür<input name="genre" placeholder="Dövüş / FPS / Yarış" /></label>
                <label>Çıkış Yılı<input name="year" type="number" min="1970" max="2100" /></label>
                <label>Metacritic<input name="metacritic" type="number" min="0" max="100" /></label>
                <label>Oyuncu Sayısı<input name="players" placeholder="1-2" /></label>
                <label>Geliştirici<input name="developer" /></label>
                <label>Dağıtıcı<input name="publisher" /></label>
                <label>Seri<input name="series" placeholder="Tekken" /></label>
              </div>
            </details>

            <details class="editor-block" open>
              <summary>Ana Sayfa İçeriği</summary>
              <div class="form-grid">
                <label class="full">Hero Alt Başlığı<input name="heroTitle" placeholder="PS1 / Dövüş Efsanesi" /></label>
                <label class="full">Kısa Açıklama<textarea name="shortDescription" rows="4"></textarea></label>
                <label class="full">Uzun Açıklama / Hikâye<textarea name="story" rows="8"></textarea></label>
              </div>
            </details>

            <details class="editor-block">
              <summary>Medya ve Linkler</summary>
              <div class="form-grid">
                <label class="full">Kapak Görseli URL<input name="cover" placeholder="https://..." /></label>
                <label class="full">YouTube Embed Linki<input name="videoUrl" placeholder="https://www.youtube.com/embed/..." /></label>
                <label class="full">Etiketler<input name="tags" placeholder="Retro Port, Dövüş, 90'lar" /></label>
                <label class="full">Screenshot URL'leri (her satıra bir tane)<textarea name="screenshots" rows="6"></textarea></label>
              </div>
            </details>

            <details class="editor-block">
              <summary>Pack Detayları</summary>
              <div class="form-grid">
                <label>Pack Sürümü<input name="packVersion" /></label>
                <label>Boyut<input name="packSize" /></label>
                <label class="full">Kontroller<input name="packControls" placeholder="Gamepad / Klavye" /></label>
                <label class="full">Notlar<textarea name="packNotes" rows="4"></textarea></label>
                <label class="full">Kurulum Adımları (her satıra bir adım)<textarea name="packSteps" rows="6"></textarea></label>
                <label class="full">Archive.org Linki<input name="archiveUrl" placeholder="https://archive.org/details/..." /></label>
              </div>
            </details>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
