      &quot;publisher&quot;: &quot;Namco&quot;,
      &quot;metacritic&quot;: 96,
      &quot;players&quot;: &quot;1-2&quot;,
      &quot;series&quot;: &quot;Tekken&quot;,
      &quot;heroTitle&quot;: &quot;PS1 / Dövüş Efsanesi&quot;,
      &quot;shortDescription&quot;: &quot;Tekken 3, hızlı dövüş temposu, ikonik karakterleri ve hâlâ keyif veren oynanışıyla bugün bile gücünü koruyan bir klasik.&quot;,
      &quot;cover&quot;: &quot;https://altdunya.github.io/assets/images/tekken3-hero.jpg&quot;,
      &quot;videoUrl&quot;: &quot;https://www.youtube.com/embed/qC4kocKOW2c?si=9KA2RMNblkBf33-Z&quot;,
      &quot;tags&quot;: [
        &quot;Retro Port&quot;,
        &quot;Dövüş&quot;,
        &quot;PS1&quot;,
        &quot;90&#x27;lar&quot;,
        &quot;Arcade&quot;,
        &quot;Klasik&quot;,
        &quot;Namco&quot;
      ],
      &quot;screenshots&quot;: [
        &quot;https://altdunya.github.io/assets/images/tekken-01.png&quot;,
        &quot;https://altdunya.github.io/assets/images/tekken-02.png&quot;,
        &quot;https://altdunya.github.io/assets/images/tekken-03.png&quot;,
        &quot;https://altdunya.github.io/assets/images/tekken-04.png&quot;
      ],
      &quot;story&quot;: &quot;Tekken 3, sadece serinin değil, tüm dövüş oyunu tarihinin en önemli yapımlarından biri olarak kabul ediliyor. PlayStation döneminde ulaştığı popülerlik, akıcı oynanışı, güçlü karakter kadrosu ve arcade hissini eve taşıyan yapısıyla boşuna değil. Jin Kazama, Hwoarang, Xiaoyu, Eddy ve daha birçok karakter sayesinde oyun her maçta farklı bir tat veriyor.\n\nBugün dönüp bakıldığında bile Tekken 3’ün temposu hâlâ güçlü. Komboların akıcılığı, karakter animasyonları ve kısa sürede eğlence vermesi onu sadece nostaljik değil, aynı zamanda hâlâ oynanabilir bir klasik hâline getiriyor. AltDünya tarafında bu oyunu öne çıkaran şey de tam olarak bu: kısa sürede aksiyona sokması, videoda iyi akması ve Retro Port formatına çok uygun olması.&quot;,
      &quot;pack&quot;: {
        &quot;version&quot;: &quot;AltDünya Pack v1.0&quot;,
        &quot;size&quot;: &quot;507 MB&quot;,
        &quot;controls&quot;: &quot;Gamepad / Klavye&quot;,
        &quot;notes&quot;: &quot;DuckStation tabanlı kolay açılır paket sürümüdür. İlk açılışta shader cache oluşumu nedeniyle kısa bir bekleme olabilir. Daha iyi deneyim için gamepad önerilir.&quot;,
        &quot;steps&quot;: [
          &quot;Zip dosyasını çıkartın.&quot;,
          &quot;Klasör içindeki start.bat dosyasını çalıştırın.&quot;,
          &quot;Oyun otomatik olarak başlayacaktır.&quot;,
          &quot;Gerekirse ilk açılıştan sonra kontrol ayarlarını düzenleyin.&quot;
        ],
        &quot;archiveUrl&quot;: &quot;https://archive.org/details/tekken-3-pc-alt-dunya-pack-v1.0&quot;
      }
    }
  ]
}</script>
<script>
const STORAGE_KEY='altdunyaAdminStandalone';
let db=loadDb();
let editId=db.games?.[0]?.id||null;
let editFilter='';

function loadDb(){
  try {
    const local=localStorage.getItem(STORAGE_KEY);
    if(local) return normalize(JSON.parse(local));
  } catch(e){}
  try {
    const raw=document.getElementById('initialData').textContent;
    return normalize(JSON.parse(raw));
  } catch(e) {
    return normalize({site:{home:{heroSlug:'',popularSlugs:[]}},games:[]});
  }
}
function normalize(data){
  data.site ||= {};
  data.site.home ||= {};
  data.games ||= [];
  if(!Array.isArray(data.site.home.popularSlugs)) data.site.home.popularSlugs=[];
  if(!data.site.home.heroSlug) data.site.home.heroSlug=data.games[0]?.slug||'';
  data.site.home.popularSlugs=data.site.home.popularSlugs.filter(Boolean).slice(0,10);
  while(data.site.home.popularSlugs.length<10) data.site.home.popularSlugs.push('');
  return data;
}
function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
function slugify(text){ return (text||'').toString().toLowerCase().trim().replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
function byId(id){ return document.getElementById(id); }
function optionList(selected=''){
  const opts=['<option value="">— Seçiniz —</option>'];
  for(const g of db.games) opts.push(`<option value="${escapeHtml(g.slug)}" ${g.slug===selected?'selected':''}>${escapeHtml(g.title)}</option>`);
  return opts.join('');
}
function escapeHtml(s){ return (s??'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function gameForm(prefix, game={}){
  const pack=game.pack||{};
  const tags=(game.tags||[]).join(', ');
  const shots=(game.screenshots||[]).join('
');
  const steps=(pack.steps||[]).join('
');
  return `
    <form id="${prefix}-form" class="stack">
      <details open><summary>Temel Bilgiler</summary><div class="details-body form-grid">
        <label>Oyun Adı<input name="title" value="${escapeHtml(game.title||'')}" required></label>
        <label>Slug<input name="slug" value="${escapeHtml(game.slug||'')}" required></label>
        <label>Kategori<select name="category">
          <option value="freeware" ${game.category==='freeware'?'selected':''}>Freeware</option>
          <option value="arcade" ${game.category==='arcade'?'selected':''}>Arcade</option>
          <option value="konsol" ${game.category==='konsol'?'selected':''}>Konsol</option>
          <option value="videolar" ${game.category==='videolar'?'selected':''}>Videolar</option>
        </select></label>
        <label>Segment<input name="segment" value="${escapeHtml(game.segment||'')}"></label>
        <label>Platform<input name="platform" value="${escapeHtml(game.platform||'')}"></label>
        <label>Tür<input name="genre" value="${escapeHtml(game.genre||'')}"></label>
        <label>Çıkış Yılı<input name="year" type="number" value="${escapeHtml(game.year||'')}"></label>
        <label>Metacritic<input name="metacritic" type="number" value="${escapeHtml(game.metacritic||'')}"></label>
        <label>Oyuncu Sayısı<input name="players" value="${escapeHtml(game.players||'')}"></label>
        <label>Geliştirici<input name="developer" value="${escapeHtml(game.developer||'')}"></label>
        <label>Dağıtıcı<input name="publisher" value="${escapeHtml(game.publisher||'')}"></label>
        <label>Seri<input name="series" value="${escapeHtml(game.series||'')}"></label>
      </div></details>
      <details open><summary>Ana Sayfa İçeriği</summary><div class="details-body form-grid">
        <label class="full">Hero Alt Başlığı<input name="heroTitle" value="${escapeHtml(game.heroTitle||'')}"></label>
        <label class="full">Kısa Açıklama<textarea name="shortDescription" rows="4">${escapeHtml(game.shortDescription||'')}</textarea></label>
        <label class="full">Uzun Açıklama / Hikâye<textarea name="story" rows="8">${escapeHtml(game.story||'')}</textarea></label>
      </div></details>
      <details><summary>Medya ve Linkler</summary><div class="details-body form-grid">
        <label class="full">Kapak Görseli URL<input name="cover" value="${escapeHtml(game.cover||'')}"></label>
        <label class="full">YouTube Embed Linki<input name="videoUrl" value="${escapeHtml(game.videoUrl||'')}"></label>
        <label class="full">Etiketler<input name="tags" value="${escapeHtml(tags)}"></label>
        <label class="full">Screenshot URL'leri<textarea name="screenshots" rows="6">${escapeHtml(shots)}</textarea></label>
      </div></details>
      <details><summary>Pack Detayları</summary><div class="details-body form-grid">
        <label>Pack Sürümü<input name="packVersion" value="${escapeHtml(pack.version||'')}"></label>
        <label>Boyut<input name="packSize" value="${escapeHtml(pack.size||'')}"></label>
        <label class="full">Kontroller<input name="packControls" value="${escapeHtml(pack.controls||'')}"></label>
        <label class="full">Notlar<textarea name="packNotes" rows="4">${escapeHtml(pack.notes||'')}</textarea></label>
        <label class="full">Kurulum Adımları<textarea name="packSteps" rows="6">${escapeHtml(steps)}</textarea></label>
        <label class="full">Archive.org Linki<input name="archiveUrl" value="${escapeHtml(pack.archiveUrl||'')}"></label>
      </div></details>
      <div class="header-row"><div class="subtle">Değişiklikleri kaydedince localStorage'a yazılır. Kalıcı kullanım için JSON dışa aktar.</div><button class="btn primary" type="submit">Kaydet</button></div>
    </form>`;
}
function collect(form, id){
  const fd=new FormData(form);
  const title=(fd.get('title')||'').toString().trim();
  const slugRaw=(fd.get('slug')||'').toString().trim();
  return {
    id:id||crypto.randomUUID(),
    title,
    slug:slugify(slugRaw||title),
    category:(fd.get('category')||'freeware').toString(),
    segment:(fd.get('segment')||'').toString().trim(),
    platform:(fd.get('platform')||'').toString().trim(),
    genre:(fd.get('genre')||'').toString().trim(),
    year:fd.get('year')?Number(fd.get('year')):null,
    developer:(fd.get('developer')||'').toString().trim(),
    publisher:(fd.get('publisher')||'').toString().trim(),
    metacritic:fd.get('metacritic')?Number(fd.get('metacritic')):null,
    players:(fd.get('players')||'').toString().trim(),
    series:(fd.get('series')||'').toString().trim(),
    heroTitle:(fd.get('heroTitle')||'').toString().trim(),
    shortDescription:(fd.get('shortDescription')||'').toString().trim(),
    cover:(fd.get('cover')||'').toString().trim(),
    videoUrl:(fd.get('videoUrl')||'').toString().trim()||null,
    tags:(fd.get('tags')||'').toString().split(',').map(s=>s.trim()).filter(Boolean),
    screenshots:(fd.get('screenshots')||'').toString().split('
').map(s=>s.trim()).filter(Boolean),
    story:(fd.get('story')||'').toString().trim(),
    pack:{
      version:(fd.get('packVersion')||'').toString().trim(),
      size:(fd.get('packSize')||'').toString().trim(),
      controls:(fd.get('packControls')||'').toString().trim(),
      notes:(fd.get('packNotes')||'').toString().trim(),
      steps:(fd.get('packSteps')||'').toString().split('
').map(s=>s.trim()).filter(Boolean),
      archiveUrl:(fd.get('archiveUrl')||'').toString().trim()
    }
  };
}
function renderAdd(){
  byId('view-add').innerHTML=`<div class="header-row"><div><h2 class="section-title">Oyun Ekle</h2><div class="subtle">Yeni bir oyun kaydı oluştur.</div></div></div>${gameForm('add')}`;
  const form=byId('add-form');
  form.title.addEventListener('input',()=>{ if(!form.slug.dataset.touched) form.slug.value=slugify(form.title.value); });
  form.slug.addEventListener('input',()=> form.slug.dataset.touched='1');
  form.addEventListener('submit',e=>{
    e.preventDefault();
    const payload=collect(form);
    if(db.games.some(g=>g.slug===payload.slug)){ alert('Bu slug zaten var.'); return; }
    db.games.unshift(payload);
    if(!db.site.home.heroSlug) db.site.home.heroSlug=payload.slug;
    persist();
    editId=payload.id;
    renderAll();
    alert('Oyun eklendi.');
  });
}
function renderEdit(){
  const filtered=db.games.filter(g=>g.title.toLowerCase().includes(editFilter.toLowerCase()));
  const current=db.games.find(g=>g.id===editId) || db.games[0] || null;
  if(current) editId=current.id;
  byId('view-edit').innerHTML=`
    <div class="grid-2">
      <div class="stack">
        <div>
          <h2 class="section-title" style="margin-bottom:8px">Oyun Düzenle</h2>
          <div class="subtle">Soldan oyunu seç, sağdan düzenle.</div>
        </div>
        <div>
          <input class="search" id="editSearch" placeholder="Oyun ara..." value="${escapeHtml(editFilter)}">
          <div class="list">${filtered.length?filtered.map(g=>`<button type="button" data-id="${g.id}" class="${g.id===editId?'active':''}"><strong>${escapeHtml(g.title)}</strong><div class="muted">${escapeHtml(g.category||'')} · ${escapeHtml(g.platform||'—')}</div></button>`).join(''):'<div class="muted">Kayıt yok.</div>'}</div>
        </div>
      </div>
      <div>
        ${current?`<div class="header-row"><div><h2 class="section-title" style="margin-bottom:8px">${escapeHtml(current.title)}</h2><div class="subtle">Mevcut kaydı güncelle.</div></div><button class="btn danger" id="deleteGameBtn" type="button">Oyunu Sil</button></div>${gameForm('edit', current)}`:'<div class="note">Henüz oyun yok. Önce Oyun Ekle menüsünden kayıt oluştur.</div>'}
      </div>
    </div>`;
  const search=byId('editSearch');
  if(search) search.addEventListener('input',e=>{ editFilter=e.target.value; renderEdit(); bindStatic(); });
  document.querySelectorAll('#view-edit .list button[data-id]').forEach(btn=>btn.addEventListener('click',()=>{ editId=btn.dataset.id; renderEdit(); bindStatic(); }));
  const del=byId('deleteGameBtn');
  if(del) del.addEventListener('click',()=>{
    const g=db.games.find(x=>x.id===editId); if(!g) return;
    if(!confirm(`${g.title} silinsin mi?`)) return;
    db.games=db.games.filter(x=>x.id!==editId);
    if(db.site.home.heroSlug===g.slug) db.site.home.heroSlug=db.games[0]?.slug||'';
    db.site.home.popularSlugs=db.site.home.popularSlugs.map(s=>s===g.slug?'':s);
    editId=db.games[0]?.id||null; persist(); renderAll();
  });
  const form=byId('edit-form');
  if(form) {
    form.addEventListener('submit',e=>{
      e.preventDefault();
      const old=db.games.find(x=>x.id===editId);
      const payload=collect(form, editId);
      if(db.games.some(g=>g.slug===payload.slug && g.id!==editId)){ alert('Bu slug başka bir oyunda kullanılıyor.'); return; }
      const idx=db.games.findIndex(x=>x.id===editId);
      db.games[idx]=payload;
      if(old && db.site.home.heroSlug===old.slug) db.site.home.heroSlug=payload.slug;
      db.site.home.popularSlugs=db.site.home.popularSlugs.map(s=>old && s===old.slug ? payload.slug : s);
      persist(); renderAll(); alert('Oyun güncellendi.');
    });
  }
}
function renderSettings(){
  const hero=db.site.home.heroSlug||'';
  const popular=db.site.home.popularSlugs||[];
  byId('view-settings').innerHTML=`
    <div class="header-row"><div><h2 class="section-title">Site Ayarları</h2><div class="subtle">Hero ve popüler oyun sıralamasını belirle.</div></div></div>
    <form id="settingsForm" class="stack">
      <label>Hero Oyunu<select name="heroSlug">${optionList(hero)}</select></label>
      <div class="hr"></div>
      <div>
        <div class="header-row" style="margin-bottom:12px"><strong>Popüler Oyunlar</strong><span class="subtle">Ana sayfa + sol hızlı liste</span></div>
        <div class="pop-grid">${Array.from({length:10},(_,i)=>`<label>Popüler #${i+1}<select name="popular_${i}">${optionList(popular[i]||'')}</select></label>`).join('')}</div>
      </div>
      <div class="header-row"><div class="subtle">Kaydedince admin panel içinde anında geçerli olur.</div><button class="btn primary" type="submit">Site Ayarlarını Kaydet</button></div>
    </form>`;
  byId('settingsForm').addEventListener('submit',e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    db.site.home.heroSlug=(fd.get('heroSlug')||'').toString();
    db.site.home.popularSlugs=Array.from({length:10},(_,i)=>(fd.get(`popular_${i}`)||'').toString());
    persist();
    alert('Site ayarları kaydedildi.');
  });
}
function bindStatic(){}
function renderAll(){ renderAdd(); renderEdit(); renderSettings(); }
function setView(name){
  document.querySelectorAll('.menu-btn').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active', v.id===`view-${name}`));
}
document.querySelectorAll('.menu-btn').forEach(btn=>btn.addEventListener('click',()=>setView(btn.dataset.view)));
byId('exportBtn').addEventListener('click',()=>{
  persist();
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='games.json'; a.click(); URL.revokeObjectURL(url);
});
byId('importInput').addEventListener('change', async e=>{
  const file=e.target.files?.[0]; if(!file) return;
  try {
    db=normalize(JSON.parse(await file.text()));
    persist();
    editId=db.games?.[0]?.id||null;
    renderAll();
    alert('JSON içe aktarıldı.');
  } catch(err) { alert('JSON okunamadı.'); }
});
renderAll();
</script>
</body>
</html>
